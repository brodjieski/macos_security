name: Sync MSCP Branches
on:
    push:
        branches:
            - ventura
       
jobs:
  test:
    runs-on: ubuntu-latest
    env: 
        CI_COMMIT_MESSAGE: Syncing Changes Files
        CI_COMMIT_AUTHOR: MSCP Robot
        CI_COMMIT_EMAIL: mscp_robot@mscp.org
    strategy:
        matrix:
            os_version: ["monterey", "big_sur"]
    steps:
      - uses: actions/checkout@v3
      - uses: jitterbit/get-changed-files@v1
        id: abc
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync Modified Files
        run: |
          echo "Modified:"
          git checkout ${{ matrix.version }}
          for changed in ${{ steps.abc.outputs.modified }}; do
            echo "checking out and syncing $changed"
          done
        #   git config --global user.name "${{ env.CI_COMMIT_AUTHOR }}"
        #   git config --global user.email "${{ env.CI_COMMIT_EMAIL }}"
        #   git add .
        #   git commit -a -m "${{ env.CI_COMMIT_MESSAGE }}"
        #   git push